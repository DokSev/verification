<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIDAČNÝ SYSTÉM SK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0a2540;
            --secondary-color: #639fab;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --background-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--background-gradient);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(10, 25, 40, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 1rem;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .input-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-color);
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--panel-border);
            border-radius: 16px;
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(99, 159, 171, 0.2);
        }

        input[type="text"]:focus + i {
            color: #ffffff;
        }

        button {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            background: linear-gradient(90deg, #52c234, #061700); /* Dégradé vert bouton d'origine */
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(82, 194, 52, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(82, 194, 52, 0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Console d'analyse technique */
        .terminal-log {
            width: 100%;
            background: #040d1a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            font-family: 'Courier New', Courier, monospace;
            display: none;
            margin-top: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .log-line {
            margin-bottom: 12px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateX(-10px);
            animation: fadeInLog 0.4s forwards;
        }

        @keyframes fadeInLog {
            to { opacity: 1; transform: translateX(0); }
        }

        .log-line i {
            font-size: 1rem;
        }

        .log-line.info { color: #a0aec0; }
        .log-line.info i { color: var(--secondary-color); }
        .log-line.success { color: var(--success-color); font-weight: bold; }
        .log-line.error { color: var(--error-color); font-weight: bold; }

        /* Conteneur du document PDF */
        #document-display {
            display: none;
            width: 100%;
            margin-top: 40px;
            animation: fadeInContainer 0.8s ease forwards;
        }

        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pdf-wrapper {
            position: relative;
            width: 100%;
            height: 700px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background: #ffffff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .help-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #e71d36;
            font-style: italic;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Pied de page */
        footer {
            margin-top: 40px;
            color: #718096;
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container" id="main-panel">
        <header>
            <h1>Validačný Systém SK</h1>
            <div class="subtitle">Vstup na oficiálny portál digitálneho overovania dokumentov</div>
        </header>

        <div class="input-section" id="auth-form">
            <div class="input-container">
                <input type="text" id="access-code" placeholder="Zadajte kód overenia" maxlength="20" autocomplete="off">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <button id="submit-btn" onclick="startVerification()">Prístup do systému</button>
        </div>

        <div class="terminal-log" id="log-console"></div>

        <div id="document-display">
            <div class="pdf-wrapper">
                <iframe id="pdf-viewer" src=""></iframe>
            </div>
            <p class="help-text">Ak sa dokument nezobrazuje správne, kliknutím sem ho stiahnite priamo vo formáte PDF.</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Slovenská Republika - Portál overovania dokumentácie. Všetky práva vyhradené.
    </footer>

    <script>
        // Fonctions d'affichage des logs techniques du terminal
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function addLog(text, type = 'info', icon = 'fa-circle-notch fa-spin') {
            const consoleEl = document.getElementById('log-console');
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.innerHTML = `<i class="fa-solid ${icon}"></i><span>${text}</span>`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            await sleep(650);
            return line;
        }

        async function startVerification() {
            const codeInput = document.getElementById('access-code').value.trim().toUpperCase();
            const formEl = document.getElementById('auth-form');
            const consoleEl = document.getElementById('log-console');
            const docDisplay = document.getElementById('document-display');
            const pdfViewer = document.getElementById('pdf-viewer');

            if (!codeInput) {
                alert("Prosím, zadajte platný kód overenia.");
                return;
            }

            // Masquage du formulaire d'entrée et réinitialisation de l'affichage
            formEl.style.display = 'none';
            consoleEl.style.display = 'block';
            consoleEl.innerHTML = '';
            docDisplay.style.display = 'none';

            // Phase de simulation de l'analyse technique
            await addLog("Inicializácia pripojenia k národnému registru...", 'info', 'fa-network-wired');
            await addLog("Zabezpečenie kanála prostredníctvom SSL/TLS protokolu...", 'info', 'fa-lock');
            await addLog(`Vyhľadávanie záznamu pre kód: ${codeInput}...`, 'info', 'fa-magnifying-glass');
            
            // Vérification de l'existence du code dans la base de données
            if (database[codeInput]) {
                const targetFile = database[codeInput].file;
                
                await addLog("Záznam úspešne nájdený v národnej databáze.", 'success', 'fa-circle-check');
                await addLog("Dešifrovanie spisovej dokumentácie a kontrola integrity...", 'info', 'fa-key');
                const lastLine = await addLog("Prístup schválený. Sťahovanie zabezpečeného dokumentu...", 'success', 'fa-file-shield');
                
                await sleep(800);
                lastLine.innerHTML = `<i class="fa-solid fa-circle-check"></i><span>Dokument je pripravený na zobrazenie.</span>`;
                
                // Chargement et affichage du document PDF correspondant
                pdfViewer.src = targetFile;
                await sleep(300);
                docDisplay.style.display = 'block';
            } else {
                // Gestion de l'erreur si le code n'est pas répertorié
                await addLog("CHYBA: Zadaný kód nie je registrovaný v systéme.", 'error', 'fa-triangle-exclamation');
                await addLog("Prístup zamietnutý. Skontrolujte kód a skúste to znova.", 'error', 'fa-circle-xmark');
                
                // Réapparition du bouton pour permettre un nouvel essai après 3 secondes
                await sleep(3000);
                consoleEl.style.display = 'none';
                formEl.style.display = 'flex';
            }
        }

        // ==========================================
        // ZONE CLIENTS : AJOUTE TES NOUVEAUX CODES ICI
        // ==========================================
        const database = {
            "SK7519B": { file: "file/validaciaspisu.pdf" }
        };
    </script>
</body>
</html>
